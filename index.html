<!doctype html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iternum Dashboards</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a2f;
      --text: #f4f7fb;
      --muted: #98a4c0;
      --border: rgba(255,255,255,.08);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#0b1020 0%,#0d1327 100%);color:var(--text)}
    .wrap{max-width:900px;margin:0 auto;padding:48px 28px}
    .panel{background:rgba(18,26,47,.92);border:1px solid var(--border);border-radius:22px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,.22)}
    h1{margin:0 0 10px;font-size:32px}
    p{color:var(--muted);line-height:1.7;margin:0 0 14px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>Iternum Dashboards</h1>
      <p>Dashboardmiljøet er opdelt i separate URL’er.</p>
      <p>Afdelingssiderne linker ikke til hinanden. Hvis der er behov for reel adgangskontrol mellem afdelinger, skal de flyttes fra offentlig GitHub Pages til privat hosting med login.</p>
    </div>
  </div>
</body>
</html>
